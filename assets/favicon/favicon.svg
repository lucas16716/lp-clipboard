<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1c1b2e"/>
      <stop offset="100%" stop-color="#0a0910"/>
    </radialGradient>

    <!-- Squircle clip -->
    <clipPath id="squircle">
      <path d="M 50,2 C 74,2 98,26 98,50 C 98,74 74,98 50,98 C 26,98 2,74 2,50 C 2,26 26,2 50,2 Z"
        style="d: path('M50,2 C25,2 2,25 2,50 C2,75 25,98 50,98 C75,98 98,75 98,50 C98,25 75,2 50,2Z')"/>
    </clipPath>

    <filter id="squircle-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Squircle shape -->
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#bg)"/>

  <!-- Subtle inner highlight — top edge -->
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22"
    fill="none"
    stroke="rgba(255,255,255,0.08)"
    stroke-width="1"/>

  <!-- Content clipped to squircle -->
  <g clip-path="url(#squircle)">

    <!-- Outer orbit ring -->
    <circle cx="50" cy="50" r="34" fill="none" stroke="#e8e4de" stroke-width="0.5" stroke-opacity="0.12"/>

    <!-- Cardinal ticks -->
    <g stroke="#e8e4de" stroke-opacity="0.2" stroke-width="0.6">
      <line x1="50" y1="13" x2="50" y2="17"/>
      <line x1="50" y1="83" x2="50" y2="87"/>
      <line x1="13" y1="50" x2="17" y2="50"/>
      <line x1="83" y1="50" x2="87" y2="50"/>
    </g>

    <!-- X diagonals -->
    <line x1="26" y1="22" x2="74" y2="78" stroke="#e8e4de" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
    <line x1="74" y1="22" x2="26" y2="78" stroke="#e8e4de" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>

    <!-- Center ring -->
    <circle cx="50" cy="50" r="10" fill="#0f0e1a" stroke="#e8e4de" stroke-width="1.2" filter="url(#glow)"/>

    <!-- X inside circle -->
    <line x1="44" y1="44" x2="56" y2="56" stroke="#e8e4de" stroke-width="2"/>
    <line x1="56" y1="44" x2="44" y2="56" stroke="#e8e4de" stroke-width="2"/>

    <!-- Origin dot -->
    <circle cx="50" cy="50" r="2.5" fill="#e8e4de"/>

    <!-- Corner dots -->
    <circle cx="26" cy="22" r="1.4" fill="#e8e4de" fill-opacity="0.35"/>
    <circle cx="74" cy="22" r="1.4" fill="#e8e4de" fill-opacity="0.35"/>
    <circle cx="26" cy="78" r="1.4" fill="#e8e4de" fill-opacity="0.35"/>
    <circle cx="74" cy="78" r="1.4" fill="#e8e4de" fill-opacity="0.35"/>

  </g>

</svg>
